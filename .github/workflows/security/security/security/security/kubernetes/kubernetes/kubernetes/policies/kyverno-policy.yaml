apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-image-signature
spec:
  validationFailureAction: enforce
  rules:
  - name: check-image
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "Image must be signed"
      pattern:
        spec:
          containers:
          - image: "?*"
